name: Auto-Update Monad Token Dictionary

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run GeckoTerminal Scraper
        run: node scripts/updateTokens.js
        
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/config/monad_tokens.json || echo "changes_exist=true" >> $GITHUB_OUTPUT
          
      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes_exist == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/config/monad_tokens.json
          git commit -m "chore: auto-update Monad token dictionary from GeckoTerminal"
          git push origin main
